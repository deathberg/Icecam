name: Build ShadowHook native library

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Configure CMake
        run: |
          cmake -S jni -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_POLICY_DEFAULT_CMP0148=OLD \
            -DCMAKE_POLICY_DEFAULT_CMP0026=OLD \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Показать собранные .so
        run: find build -name "*.so" -exec ls -lh {} \;

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: icecam_hook-arm64-v8a
          path: build/**/libicecam_hook.so
          if-no-files-found: error